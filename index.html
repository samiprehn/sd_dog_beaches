<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SD Dog Beach Info</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐕</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="app"></div>

    <script type="module">
        const beaches = [
            {
                name: "OB",
                location: "SD",
                lat: 32.7503,
                lon: -117.2517,
                webcams: [
                    { name: "OB Beach Cam", url: "https://oceanbeachsandiego.com/media/ob-beach-cam" }
                ]
            },
            {
                name: "Del Mar",
                location: "Del Mar",
                lat: 32.9595,
                lon: -117.2654,
                webcams: [
                    { name: "Del Mar Beach North", url: "https://hdontap.com/stream/199841/del-mar-beach-north-live-webcam/" },
                    { name: "Del Mar Beach Community Overlook", url: "https://hdontap.com/stream/101962/del-mar-beach-community-ultra-hd-overlook-live-webcvam/" },
                    { name: "17th St Del Mar Beach Southwest", url: "https://hdontap.com/stream/122912/17th-st-del-mar-beach-4k-southwest-live-webcam/" },
                    { name: "Del Mar Beach South Roaming", url: "https://hdontap.com/stream/399483/del-mar-beach-south-roaming-live-webcam/" }
                ]
            },
            {
                name: "Coronado",
                location: "Coronado",
                lat: 32.6859,
                lon: -117.1831,
                webcams: [
                    { name: "Hotel Del Coronado North Roaming", url: "https://hdontap.com/stream/327869/hotel-del-coronado-north-roaming-live-cam/" },
                    { name: "Hotel Del Coronado Roaming", url: "https://hdontap.com/stream/964952/hotel-del-coronado-4k-roaming-live-cam/" }
                ]
            }
        ];

        const waterTempStations = [
            { name: "Del Mar", buoyId: "46266" },
            { name: "La Jolla Shores", buoyId: "LJAC1" },
            { name: "San Diego Bay", buoyId: "SDBC1" },
            { name: "Imperial Beach", buoyId: "46235" }
        ];

        let weatherData = {};
        let waterTempData = {};
        let tideData = null;
        let sunData = null;
        let uvData = null;
        let loading = true;
        let selectedTab = 'today'; // 'today', 'saturday', 'sunday'
        let selectedDate = new Date();

        const getWeatherDescription = (code) => {
            const weatherCodes = {
                0: "☀️", 1: "🌤️", 2: "⛅", 3: "☁️",
                45: "🌫️", 48: "🌫️", 51: "🌦️", 53: "🌧️",
                61: "🌧️", 63: "🌧️", 65: "🌧️",
                80: "🌦️", 95: "⛈️"
            };
            return weatherCodes[code] || "🌈";
        };

        const getWindDirection = (degrees) => {
            const directions = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];
            return directions[Math.round(degrees / 45) % 8];
        };

        const getNextDayOfWeek = (dayOfWeek) => {
            // dayOfWeek: 0 = Sunday, 6 = Saturday
            const today = new Date();
            const todayDay = today.getDay();
            let daysToAdd = dayOfWeek - todayDay;
            if (daysToAdd <= 0) daysToAdd += 7;
            const targetDate = new Date(today);
            targetDate.setDate(today.getDate() + daysToAdd);
            return targetDate;
        };

        const formatDateLong = (date) => {
            return date.toLocaleDateString('en-US', {
                weekday: 'long',
                month: 'long',
                day: 'numeric'
            });
        };

        const setTab = (tab) => {
            selectedTab = tab;
            if (tab === 'today') {
                selectedDate = new Date();
            } else if (tab === 'saturday') {
                selectedDate = getNextDayOfWeek(6);
            } else if (tab === 'sunday') {
                selectedDate = getNextDayOfWeek(0);
            }
            loading = true;
            render();
            fetchData();
        };

        async function fetchWaterTemp(buoyId) {
            try {
                const res = await fetch(`https://corsproxy.io/?https://www.ndbc.noaa.gov/data/realtime2/${buoyId}.txt`);
                if (!res.ok) return null;
                
                const text = await res.text();
                const lines = text.trim().split('\n');
                if (lines.length < 3) return null;
                
                const dataLine = lines[2].trim().split(/\s+/);
                const headerLine = lines[0].trim().split(/\s+/);
                
                const wtmpIndex = headerLine.indexOf('WTMP');
                if (wtmpIndex === -1) return null;
                
                const tempC = parseFloat(dataLine[wtmpIndex]);
                if (isNaN(tempC) || tempC === 99 || tempC === 999) return null;
                
                return (tempC * 9/5 + 32).toFixed(1);
            } catch (err) {
                console.error(`Error fetching water temp for buoy ${buoyId}:`, err);
                return null;
            }
        }

        async function fetchData() {
            try {
                const targetDate = new Date(selectedDate);
                const today = targetDate.toISOString().split('T')[0].replace(/-/g, '');
                const tomorrow = new Date(targetDate.getTime() + 24 * 60 * 60 * 1000).toISOString().split('T')[0].replace(/-/g, '');
                const dateForApi = targetDate.toISOString().split('T')[0];
                
                const tideRes = await fetch(
                    `https://api.tidesandcurrents.noaa.gov/api/prod/datagetter?begin_date=${today}&end_date=${tomorrow}&station=9410230&product=predictions&datum=MLLW&time_zone=lst_ldt&units=english&interval=hilo&format=json`
                );
                
                if (tideRes.ok) {
                    const tideJson = await tideRes.json();
                    tideData = tideJson.predictions || [];
                }

                // Fetch sunrise/sunset data
                const sunRes = await fetch(
                    `https://api.sunrise-sunset.org/json?lat=32.7503&lng=-117.2517&formatted=0&date=${dateForApi}`
                );
                
                if (sunRes.ok) {
                    const sunJson = await sunRes.json();
                    if (sunJson.status === 'OK') {
                        sunData = sunJson.results;
                    }
                }

                // Fetch UV index data
                const uvRes = await fetch(
                    `https://api.open-meteo.com/v1/forecast?latitude=32.7157&longitude=-117.1611&hourly=uv_index&timezone=America/Los_Angeles`
                );

                if (uvRes.ok) {
                    const uvJson = await uvRes.json();

                    // Find selected date's data
                    const todayHours = uvJson.hourly.time.map(t => new Date(t));
                    const todayIndex = todayHours.findIndex(d =>
                        d.getDate() === targetDate.getDate() &&
                        d.getMonth() === targetDate.getMonth() &&
                        d.getFullYear() === targetDate.getFullYear()
                    );

                    if (todayIndex !== -1) {
                        uvData = {
                            uv10am: Math.round(uvJson.hourly.uv_index[todayIndex + 10]),
                            uvNoon: Math.round(uvJson.hourly.uv_index[todayIndex + 12]),
                            uv2pm: Math.round(uvJson.hourly.uv_index[todayIndex + 14]),
                            uv4pm: Math.round(uvJson.hourly.uv_index[todayIndex + 16])
                        };
                    }
                }

                for (let i = 0; i < beaches.length; i++) {
                    const beach = beaches[i];
                    const res = await fetch(
                        `https://api.open-meteo.com/v1/forecast?latitude=${beach.lat}&longitude=${beach.lon}&current=temperature_2m,relative_humidity_2m,precipitation,weather_code,wind_speed_10m,wind_direction_10m&hourly=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m,wind_direction_10m&daily=temperature_2m_max,temperature_2m_min&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=America/Los_Angeles`
                    );

                    if (res.ok) {
                        const data = await res.json();

                        // Find the index for selected date
                        const dateIndex = data.daily.time.findIndex(d => d === dateForApi);

                        if (selectedTab === 'today') {
                            weatherData[i] = {
                                current: data.current,
                                dailyMax: data.daily.temperature_2m_max[0]
                            };
                        } else if (dateIndex !== -1) {
                            // For future dates, use noon forecast (12pm)
                            const hourIndex = data.hourly.time.findIndex(t => {
                                const dt = new Date(t);
                                return dt.getDate() === targetDate.getDate() &&
                                       dt.getMonth() === targetDate.getMonth() &&
                                       dt.getHours() === 12;
                            });

                            if (hourIndex !== -1) {
                                weatherData[i] = {
                                    current: {
                                        temperature_2m: data.hourly.temperature_2m[hourIndex],
                                        relative_humidity_2m: data.hourly.relative_humidity_2m[hourIndex],
                                        weather_code: data.hourly.weather_code[hourIndex],
                                        wind_speed_10m: data.hourly.wind_speed_10m[hourIndex],
                                        wind_direction_10m: data.hourly.wind_direction_10m[hourIndex]
                                    },
                                    dailyMax: data.daily.temperature_2m_max[dateIndex]
                                };
                            }
                        }
                    }
                }

                for (let i = 0; i < waterTempStations.length; i++) {
                    const station = waterTempStations[i];
                    const waterTemp = await fetchWaterTemp(station.buoyId);
                    waterTempData[i] = waterTemp;
                }

                loading = false;
                render();
            } catch (err) {
                console.error('Error fetching data:', err);
                loading = false;
                render();
            }
        }

        function render() {
            const today = new Date();
            const isSaturday = today.getDay() === 6;
            const nextSaturday = getNextDayOfWeek(6);
            const nextSunday = getNextDayOfWeek(0);

            const html = `
                <div class="min-h-screen bg-gradient-to-br from-blue-400 via-blue-300 to-cyan-300 p-2">
                    <div class="max-w-6xl mx-auto">
                        <!-- Header -->
                        <div class="text-center mb-2">
                            <h1 class="text-2xl font-bold text-white drop-shadow-lg">🐕 🏖️ San Diego Dog Beach Info</h1>
                        </div>

                        <!-- Tabs -->
                        <div class="bg-white rounded-lg shadow-md overflow-hidden mb-2">
                            <div class="flex">
                                <button
                                    onclick="setTab('today')"
                                    class="flex-1 py-1.5 px-2 text-sm font-semibold transition-colors ${selectedTab === 'today' ? 'bg-blue-600 text-white' : 'bg-white text-gray-700 hover:bg-gray-100'}"
                                >
                                    <div>Today</div>
                                    <div class="text-xs font-normal ${selectedTab === 'today' ? 'text-blue-100' : 'text-gray-500'}">${today.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}</div>
                                </button>
                                ${!isSaturday ? `<button
                                    onclick="setTab('saturday')"
                                    class="flex-1 py-1.5 px-2 text-sm font-semibold transition-colors border-l border-r border-gray-200 ${selectedTab === 'saturday' ? 'bg-blue-600 text-white' : 'bg-white text-gray-700 hover:bg-gray-100'}"
                                >
                                    <div>Saturday</div>
                                    <div class="text-xs font-normal ${selectedTab === 'saturday' ? 'text-blue-100' : 'text-gray-500'}">${nextSaturday.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}</div>
                                </button>` : ''}
                                <button
                                    onclick="setTab('sunday')"
                                    class="flex-1 py-1.5 px-2 text-sm font-semibold transition-colors border-l border-gray-200 ${selectedTab === 'sunday' ? 'bg-blue-600 text-white' : 'bg-white text-gray-700 hover:bg-gray-100'}"
                                >
                                    <div>Sunday</div>
                                    <div class="text-xs font-normal ${selectedTab === 'sunday' ? 'text-blue-100' : 'text-gray-500'}">${nextSunday.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}</div>
                                </button>
                            </div>
                        </div>

                        <!-- Timing -->
                        <div class="bg-white rounded-xl shadow-lg overflow-hidden mb-2">
                            <div class="bg-gradient-to-r from-cyan-600 to-blue-600 p-2 text-white">
                                <h2 class="text-xl font-bold">Timing 🌅 🌇 🌊 🕐</h2>
                            </div>
                            <div class="p-2 bg-gradient-to-br from-cyan-50 to-blue-50">
                                ${loading ? `
                                    <div class="bg-white p-2 rounded-lg text-center border border-cyan-100">
                                        <div class="animate-spin rounded-full h-6 w-6 border-b-2 border-cyan-600 mx-auto"></div>
                                        <p class="text-gray-600 mt-2 text-sm">Loading data...</p>
                                    </div>
                                ` : `
                                    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-2">
                                        ${sunData ? `
                                            <div class="bg-white p-2 rounded-lg border border-amber-200">
                                                <p class="text-xs font-semibold mb-1 text-amber-600">Sunrise</p>
                                                <p class="text-base font-bold text-gray-900">${new Date(sunData.sunrise).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', timeZone: 'America/Los_Angeles' })}</p>
                                            </div>
                                            <div class="bg-white p-2 rounded-lg border border-orange-200">
                                                <p class="text-xs font-semibold mb-1 text-orange-600">Sunset</p>
                                                <p class="text-base font-bold text-gray-900">${new Date(sunData.sunset).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', timeZone: 'America/Los_Angeles' })}</p>
                                            </div>
                                        ` : ''}
                                        ${tideData && tideData.length > 0 ? tideData.slice(0, 4).map(tide => `
                                            <div class="bg-white p-2 rounded-lg border border-cyan-100">
                                                <p class="text-xs font-semibold mb-1 ${tide.type === 'H' ? 'text-blue-600' : 'text-orange-600'}">
                                                    ${tide.type === 'H' ? 'High Tide' : 'Low Tide'}
                                                </p>
                                                <p class="text-base font-bold text-gray-900">${new Date(tide.t).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })} (${parseFloat(tide.v).toFixed(1)} ft)</p>
                                            </div>
                                        `).join('') : `
                                            <div class="bg-white p-2 rounded-lg text-center border border-cyan-100 col-span-4">
                                                <p class="text-gray-600 text-sm">Tide data unavailable</p>
                                            </div>
                                        `}
                                    </div>
                                `}
                            </div>
                        </div>

                        <!-- Beach Conditions -->
                        <div class="bg-white rounded-xl shadow-lg overflow-hidden mb-2 mt-1">
                            <div class="bg-gradient-to-r from-amber-500 to-yellow-600 p-2 text-white">
                                <h2 class="text-xl font-bold">Conditions ☀️ ⛅</h2>
                            </div>
                            <div class="p-2">
                                ${loading || !weatherData[0] ? `
                                    <div class="flex items-center justify-center py-4">
                                        <div class="animate-spin rounded-full h-6 w-6 border-b-2 border-blue-600"></div>
                                    </div>
                                ` : `
                                    <div class="overflow-x-auto">
                                        <table class="w-full">
                                            <thead class="bg-amber-100">
                                                <tr class="border-b border-gray-200">
                                                    <th class="text-left py-2 px-2 font-semibold text-gray-700 text-sm">Beach</th>
                                                    ${selectedTab === 'today' ? '<th class="text-center py-2 px-2 font-semibold text-gray-700 text-sm max-w-[80px]">Current Temp</th>' : ''}
                                                    <th class="text-center py-2 px-2 font-semibold text-gray-700 text-sm max-w-[80px]">High Temp</th>
                                                    <th class="text-center py-2 px-2 font-semibold text-gray-700 text-sm">Outlook</th>
                                                    <th class="text-center py-2 px-2 font-semibold text-gray-700 text-sm max-w-[80px]">Wind (mph)</th>
                                                    <th class="text-center py-2 px-2 font-semibold text-gray-700 text-sm">Humidity</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                ${beaches.map((beach, idx) => {
                                                    const weather = weatherData[idx];
                                                    if (!weather) return '';
                                                    return `
                                                        <tr class="border-b border-gray-100 hover:bg-amber-50 transition-colors">
                                                            <td class="py-2 px-2">
                                                                <div class="font-bold text-gray-900 text-sm">${beach.name}</div>
                                                            </td>
                                                            ${selectedTab === 'today' ? `
                                                            <td class="text-center py-2 px-2">
                                                                <div class="text-lg font-bold text-blue-600">${Math.round(weather.current.temperature_2m)}°</div>
                                                            </td>
                                                            ` : ''}
                                                            <td class="text-center py-2 px-2">
                                                                <div class="text-lg font-bold text-orange-600">${Math.round(weather.dailyMax)}°</div>
                                                            </td>
                                                            <td class="text-center py-2 px-2">
                                                                <div class="font-semibold text-gray-900 text-sm">${getWeatherDescription(weather.current.weather_code)}</div>
                                                            </td>
                                                            <td class="text-center py-2 px-2">
                                                                <div class="font-semibold text-gray-900 text-sm">${Math.round(weather.current.wind_speed_10m)} ${getWindDirection(weather.current.wind_direction_10m)}</div>
                                                            </td>
                                                            <td class="text-center py-2 px-2">
                                                                <div class="text-base font-bold text-gray-900">${weather.current.relative_humidity_2m}%</div>
                                                            </td>
                                                        </tr>
                                                    `;
                                                }).join('')}
                                            </tbody>
                                        </table>
                                    </div>
                                `}
                            </div>
                        </div>

                        <!-- UV Index -->
                        <div class="bg-white rounded-xl shadow-lg overflow-hidden mb-2">
                            <div class="bg-gradient-to-r from-orange-600 to-yellow-500 p-2 text-white">
                                <h2 class="text-xl font-bold">UV Index ☀️</h2>
                            </div>
                            <div class="p-2">
                                ${loading ? `
                                    <div class="flex items-center justify-center py-4">
                                        <div class="animate-spin rounded-full h-6 w-6 border-b-2 border-orange-600"></div>
                                    </div>
                                ` : uvData ? `
                                    <div class="grid grid-cols-4 gap-2">
                                        <div class="bg-yellow-50 p-2 rounded-lg border border-yellow-200">
                                            <p class="text-xs text-gray-600 mb-1">10 AM</p>
                                            <p class="text-xl font-bold text-orange-600">${uvData.uv10am !== null ? uvData.uv10am : '—'}</p>
                                        </div>
                                        <div class="bg-yellow-50 p-2 rounded-lg border border-yellow-200">
                                            <p class="text-xs text-gray-600 mb-1">Noon</p>
                                            <p class="text-xl font-bold text-orange-600">${uvData.uvNoon !== null ? uvData.uvNoon : '—'}</p>
                                        </div>
                                        <div class="bg-yellow-50 p-2 rounded-lg border border-yellow-200">
                                            <p class="text-xs text-gray-600 mb-1">2 PM</p>
                                            <p class="text-xl font-bold text-orange-600">${uvData.uv2pm !== null ? uvData.uv2pm : '—'}</p>
                                        </div>
                                        <div class="bg-yellow-50 p-2 rounded-lg border border-yellow-200">
                                            <p class="text-xs text-gray-600 mb-1">4 PM</p>
                                            <p class="text-xl font-bold text-orange-600">${uvData.uv4pm !== null ? uvData.uv4pm : '—'}</p>
                                        </div>
                                    </div>
                                ` : `
                                    <div class="bg-yellow-50 p-2 rounded-lg text-center border border-yellow-200">
                                        <p class="text-gray-600 text-sm">UV data unavailable</p>
                                    </div>
                                `}
                            </div>
                        </div>

                        <!-- Ocean Temperature -->
                        ${selectedTab === 'today' ? `
                        <div class="bg-white rounded-xl shadow-lg overflow-hidden mb-2">
                            <div class="bg-gradient-to-r from-cyan-600 to-teal-600 p-2 text-white">
                                <h2 class="text-xl font-bold">Ocean Temperature 🌡️</h2>
                            </div>
                            <div class="p-2">
                                ${loading ? `
                                    <div class="flex items-center justify-center py-4">
                                        <div class="animate-spin rounded-full h-6 w-6 border-b-2 border-cyan-600"></div>
                                    </div>
                                ` : `
                                    <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
                                        ${waterTempStations.map((station, idx) => {
                                            const temp = waterTempData[idx];
                                            return `
                                                <div class="bg-cyan-50 p-2 rounded-lg border border-cyan-100">
                                                    <p class="text-xs text-gray-600 mb-1">${station.name}</p>
                                                    <p class="text-xl font-bold text-cyan-600">${temp ? temp + '°' : '—'}</p>
                                                </div>
                                            `;
                                        }).join('')}
                                    </div>
                                `}
                            </div>
                        </div>
                        ` : ''}

                        <!-- Webcams -->
                        ${selectedTab === 'today' ? `
                        <div class="bg-white rounded-xl shadow-lg overflow-hidden">
                            <div class="bg-gradient-to-r from-orange-600 to-red-600 p-2 text-white">
                                <h2 class="text-xl font-bold">Webcams 📹</h2>
                            </div>
                            <div class="p-2 space-y-3">
                                ${beaches.map((beach, idx) => `
                                    <div>
                                        <h3 class="text-base font-bold text-gray-900 mb-2">${beach.name}</h3>
                                        <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
                                            ${beach.webcams.map(cam => `
                                                <a href="${cam.url}" target="_blank" rel="noopener noreferrer" 
                                                   class="block bg-orange-500 hover:bg-orange-700 text-white font-semibold py-2 px-4 rounded-lg text-center transition-colors text-sm">
                                                    ${cam.name}
                                                </a>
                                            `).join('')}
                                        </div>
                                    </div>
                                `).join('<hr class="my-3 border-gray-200">')}
                            </div>
                        </div>
                        ` : ''}

                        <a href="https://buymeacoffee.com/samiprehn" target="_blank" rel="noopener noreferrer" class="block text-center mt-8 mb-4 text-white text-sm hover:text-white/80 transition-colors" style="text-decoration: none;">
                            Keep this page running
                        </a>
                    </div>
                </div>
            `;

            document.getElementById('app').innerHTML = html;
        }

        // Make setTab globally accessible
        window.setTab = setTab;

        render();
        fetchData();
    </script>
</body>
</html>
